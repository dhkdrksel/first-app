<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minto — AI 회의록 자동 정리</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RFHYR8GVFE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-RFHYR8GVFE');
  </script>
</head>
<body>

  <!-- ──────────────────────────────────────────
       화면 1: 랜딩 페이지
  ────────────────────────────────────────── -->
  <div id="screen-landing" class="screen active">
    <header class="landing-header">
      <span class="logo">Minto</span>
    </header>

    <main class="landing-main">
      <div class="badge">AI 회의록 자동화</div>
      <h1 class="landing-title">
        회의 내용을<br />
        <span class="highlight">깔끔한 회의록</span>으로
      </h1>
      <p class="landing-desc">
        회의 내용을 그대로 붙여넣기만 하세요.<br />
        Minto가 회사 스타일에 맞게 자동으로 정리해드립니다.
      </p>

      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-icon">⚡</span>
          <span>30초 만에 완성</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🎨</span>
          <span>다양한 템플릿</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">📋</span>
          <span>원클릭 복사</span>
        </div>
      </div>

      <button class="btn-primary btn-large" onclick="goTo('screen-input')">
        무료로 시작하기
        <span class="btn-arrow">→</span>
      </button>
    </main>

    <div class="landing-visual">
      <div class="mock-card">
        <div class="mock-label">회의 내용 입력</div>
        <div class="mock-lines">
          <div class="mock-line w80"></div>
          <div class="mock-line w60"></div>
          <div class="mock-line w90"></div>
          <div class="mock-line w50"></div>
        </div>
        <div class="mock-arrow-down">↓</div>
        <div class="mock-label">정리된 회의록</div>
        <div class="mock-section">
          <div class="mock-section-title"></div>
          <div class="mock-line w70"></div>
          <div class="mock-line w55"></div>
        </div>
        <div class="mock-section">
          <div class="mock-section-title"></div>
          <div class="mock-line w80"></div>
          <div class="mock-line w40"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ──────────────────────────────────────────
       화면 2: 입력 화면
  ────────────────────────────────────────── -->
  <div id="screen-input" class="screen">
    <header class="app-header">
      <button class="btn-back" onclick="goTo('screen-landing')">← 홈</button>
      <span class="logo">Minto</span>
      <div class="step-indicator">1 / 2</div>
    </header>

    <main class="app-main">
      <h2 class="section-title">회의록 만들기</h2>

      <!-- 템플릿 선택 -->
      <div class="field-group">
        <label class="field-label">템플릿 선택</label>
        <div class="template-grid" id="templateGrid">
          <button class="template-card selected" data-template="standard">
            <span class="template-icon">📄</span>
            <span class="template-name">표준형</span>
            <span class="template-desc">일반적인 회의록 형식</span>
          </button>
          <button class="template-card" data-template="action">
            <span class="template-icon">✅</span>
            <span class="template-name">액션 중심</span>
            <span class="template-desc">할 일 · 담당자 강조</span>
          </button>
          <button class="template-card" data-template="decision">
            <span class="template-icon">🎯</span>
            <span class="template-name">의사결정형</span>
            <span class="template-desc">결정 사항 중심 정리</span>
          </button>
          <button class="template-card" data-template="brief">
            <span class="template-icon">⚡</span>
            <span class="template-name">간결형</span>
            <span class="template-desc">핵심만 짧게 요약</span>
          </button>
        </div>
      </div>

      <!-- 텍스트 입력 -->
      <div class="field-group">
        <label class="field-label" for="meetingInput">
          회의 내용 붙여넣기
        </label>
        <textarea
          id="meetingInput"
          class="textarea-main"
          placeholder="회의에서 나눈 대화, 메모, 녹취 내용 등을 자유롭게 붙여넣어 주세요.

예시)
오늘 마케팅팀 미팅. 참석자 김철수, 이영희, 박민준.
다음 달 SNS 캠페인 방향 논의함. 인스타 중심으로 가기로 결정.
김철수가 콘텐츠 기획안 5월 3일까지 작성하기로.
예산은 500만원으로 확정. 이영희가 집행 담당..."
        ></textarea>
        <div class="char-count">
          <span id="charCount">0</span>자 입력됨
        </div>
      </div>

      <button class="btn-primary btn-full" id="convertBtn" onclick="convertMeeting()">
        <span id="convertBtnText">회의록 변환하기</span>
        <span class="btn-arrow">→</span>
      </button>
    </main>
  </div>

  <!-- ──────────────────────────────────────────
       화면 3: 결과 화면
  ────────────────────────────────────────── -->
  <div id="screen-result" class="screen">
    <header class="app-header">
      <button class="btn-back" onclick="goTo('screen-input')">← 수정</button>
      <span class="logo">Minto</span>
      <div class="step-indicator">2 / 2</div>
    </header>

    <main class="app-main">
      <div class="result-header">
        <h2 class="section-title">정리된 회의록</h2>
        <div class="result-actions">
          <button class="btn-copy" id="copyBtn" onclick="copyResult()">
            📋 복사하기
          </button>
          <button class="btn-secondary" onclick="goTo('screen-input')">
            다시 변환
          </button>
        </div>
      </div>

      <div class="result-meta" id="resultMeta"></div>

      <div class="result-box" id="resultBox"></div>

      <div class="result-footer">
        <button class="btn-primary btn-full" onclick="goTo('screen-landing')">
          처음으로 돌아가기
        </button>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
